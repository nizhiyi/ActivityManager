name: Production Release

on:
  workflow_dispatch:
  push:
    branches: [ main ]
    paths-ignore:
      - '**.md'
      - '**.txt'
      - '.github/**'
      - '.idea/**'
      - '!.github/workflows/**'

jobs:
  publish-release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Grant execute permission for gradlew
        run: chmod +x gradlew

      - name: Build Prod Release
        run: |
          # We pass the version code calculation to keep it in sync with your logic
          ./gradlew assembleProdRelease \
          -PnewVersionCode=$((558 + ${{ github.run_number }}))

      - name: Upload Release APK
        uses: actions/upload-artifact@v4
        with:
          name: release-apk
          path: app/build/outputs/apk/prod/release/*.apk
          if-no-files-found: warn
          compression-level: 6
          overwrite: false
          include-hidden-files: false
